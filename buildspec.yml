version: 0.2

phases:
  install:
    runtime-versions:
      python: "3.13"
    commands:
      - wget https://releases.hashicorp.com/terraform/1.5.7/terraform_1.5.7_linux_amd64.zip
      - unzip -o terraform_1.5.7_linux_amd64.zip -d /tmp/terraform
      - mv /tmp/terraform/terraform /usr/local/bin/terraform
      - terraform --version
      - cd unwastify-frontend && npm install

  build:
    commands:
      # Zip and deploy Lambda functions via Terraform
      - cd $CODEBUILD_SRC_DIR/terraform
      - mkdir -p lambdas
      - for lambda in add_to_pantry delete_pantry_item delete_shopping_item generate_shopping_list get_family_info get_pantry get_shopping_list mark_as_bought mark_consumed mark_expired mark_wasted post_confirmation update_family_info; do zip -j lambdas/$lambda.zip src/$lambda.py layers/common_utils/python/decimal_helper.py; done
      - terraform init
      - terraform apply -auto-approve

      # Build and push ML model Docker image to ECR
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 250857930603.dkr.ecr.us-east-1.amazonaws.com
      - docker buildx create --use --name mybuilder || true
      - DOCKER_BUILDKIT=1 docker buildx build --platform linux/amd64 --provenance=false --push -t 250857930603.dkr.ecr.us-east-1.amazonaws.com/shopping_model:latest $CODEBUILD_SRC_DIR/shopping-model/

      # Build and deploy React frontend for provision 1.6
      - cd $CODEBUILD_SRC_DIR/unwastify-frontend
      - npm run build
      - aws s3 sync dist/ s3://unwastify-frontend --delete

artifacts:
  files:
    - "**/*"
