version: 0.2

phases:
  install:
    runtime-versions:
      python: "3.13"
    commands:
      - wget https://releases.hashicorp.com/terraform/1.5.7/terraform_1.5.7_linux_amd64.zip
      - unzip -o terraform_1.5.7_linux_amd64.zip -d /tmp/terraform
      - mv /tmp/terraform/terraform /usr/local/bin/terraform
      - terraform --version
      - cd unwastify-frontend && npm install

  build:
    commands:
      - cd $CODEBUILD_SRC_DIR/terraform
      - mkdir -p lambdas
      - for lambda in add_to_pantry delete_pantry_item delete_shopping_item generate_shopping_list get_pantry get_shopping_list mark_as_bought mark_expired mark_wasted post_confirmation update_family_info; do zip -j lambdas/$lambda.zip src/$lambda.py layers/common_utils/python/decimal_helper.py; done
      - terraform init
      - terraform apply -auto-approve
      - cd $CODEBUILD_SRC_DIR/unwastify-frontend
      - rm -rf node_modules/.vite
      - npm run build
      - aws s3 sync dist/ s3://unwastify-frontend --delete

artifacts:
  files:
    - "**/*"
